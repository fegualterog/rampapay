name: Deploy to QA

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION:   us-east-1
  ECR_REGISTRY: 658424926180.dkr.ecr.us-east-1.amazonaws.com
  ECS_CLUSTER:  rampa-ebob-qa-cluster
  DEPLOY_ROLE:  arn:aws:iam::658424926180:role/rampa-ebob-qa-github-deploy-role

jobs:

  # ─── API ────────────────────────────────────────────────────────────────────
  deploy-api:
    name: API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push
        id: build
        run: |
          IMAGE=${{ env.ECR_REGISTRY }}/rampa-ebob-api:${{ github.sha }}
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Deploy to ECS
        run: |
          IMAGE="${{ steps.build.outputs.image }}"

          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition rampa-ebob-qa-api \
            --query taskDefinition --output json)

          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg IMAGE "$IMAGE" \
            '.containerDefinitions = [.containerDefinitions[] |
               if .name == "api" then .image = $IMAGE else . end] |
             del(.taskDefinitionArn,.revision,.status,.requiresAttributes,
                 .placementConstraints,.compatibilities,.registeredAt,.registeredBy)')

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query taskDefinition.taskDefinitionArn --output text)

          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service rampa-ebob-qa-api \
            --task-definition "$NEW_ARN" \
            --force-new-deployment

          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services rampa-ebob-qa-api

  # ─── Admin App ──────────────────────────────────────────────────────────────
  deploy-admin:
    name: Admin App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push
        id: build
        run: |
          IMAGE=${{ env.ECR_REGISTRY }}/rampa-ebob-admin:${{ github.sha }}
          docker build -t "$IMAGE" -f admin/Dockerfile .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Deploy to ECS
        run: |
          IMAGE="${{ steps.build.outputs.image }}"

          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition rampa-ebob-qa-admin-app \
            --query taskDefinition --output json)

          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg IMAGE "$IMAGE" \
            '.containerDefinitions = [.containerDefinitions[] |
               if .name == "admin-app" then .image = $IMAGE else . end] |
             del(.taskDefinitionArn,.revision,.status,.requiresAttributes,
                 .placementConstraints,.compatibilities,.registeredAt,.registeredBy)')

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query taskDefinition.taskDefinitionArn --output text)

          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service rampa-ebob-qa-admin-app \
            --task-definition "$NEW_ARN" \
            --force-new-deployment

          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services rampa-ebob-qa-admin-app

  # ─── Co-signer ──────────────────────────────────────────────────────────────
  deploy-cosigner:
    name: Co-signer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push
        id: build
        run: |
          IMAGE=${{ env.ECR_REGISTRY }}/rampa-ebob-cosigner:${{ github.sha }}
          docker build -t "$IMAGE" -f cosigner/Dockerfile .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Deploy to ECS
        run: |
          IMAGE="${{ steps.build.outputs.image }}"

          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition rampa-ebob-qa-cosigner \
            --query taskDefinition --output json)

          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg IMAGE "$IMAGE" \
            '.containerDefinitions = [.containerDefinitions[] |
               if .name == "cosigner" then .image = $IMAGE else . end] |
             del(.taskDefinitionArn,.revision,.status,.requiresAttributes,
                 .placementConstraints,.compatibilities,.registeredAt,.registeredBy)')

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query taskDefinition.taskDefinitionArn --output text)

          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service rampa-ebob-qa-cosigner \
            --task-definition "$NEW_ARN" \
            --force-new-deployment

          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services rampa-ebob-qa-cosigner
